<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성적 판별 프로그램</title>
</head>
<body>
<script>
    // 점수 입력 받기
    let korean = prompt('국어 점수를 입력하세요:', '');
    let english = prompt('영어 점수를 입력하세요:', '');
    let math = prompt('수학 점수를 입력하세요:', '');

    // 문자열을 숫자로 변환
    korean = Number(korean);
    english = Number(english);
    math = Number(math);

    // 입력 검증
    if (isNaN(korean) || isNaN(english) || isNaN(math)) {
        document.write("⚠️ 숫자만 입력해주세요!");
    } else {
        // 평균 계산
        let average = (korean + english + math) / 3;

        // 조건 판별: 평균 70 이상 + 각 과목 60 이상
        let result = (average >= 70) && 
                     (korean >= 60) && 
                     (english >= 60) && 
                     (math >= 60);

        // 결과 출력
        document.write(result);
    }
</script>    
</body>
</html>
