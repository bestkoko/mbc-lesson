<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="../02/style.css">
</head>
<body>
    <!--form : 웹브라우저에서 유일하게 사용자의 데이터를 입력받을수 있는 요소
        action: 사용자가 정보를 저장할 서버주소 
        method: 전송방식(get-공개형, post-비공개형)
        --> 
        
    <form action="#" method="get">
        <fieldset>
            <legend>로그인입력창</legend>
            <p>ID: <input type="text"></p>
            <p>PW: <input type="password"></p>
            <p>검색: <input type="search"></p>
            <p>이메일: <input type="email"></p>
            <p>전화번호: <input type="tel"></p>
            <p>컬러선택: <input type="color" value="000000"></p>
            
            
        </fieldset>    
    </form>
</body>   
</html>
