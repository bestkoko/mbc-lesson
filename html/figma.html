<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFEIN Banner</title>
    <link rel="stylesheet" href="figma.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Unbounded:wght@800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="banner">
        <!-- Decoration Layers -->
        <div class="decoration">
            <div class="box bottom-box"></div>
            <div class="box right-box"></div>
            <div class="box left-box">
                <img src="https://www.figma.com/api/mcp/asset/9617e150-2181-4e99-b6fd-e2c85b56d552" alt="Coffee">
            </div>
            <div class="box top-box"></div>
        </div>

        <!-- Text Content -->
        <div class="title-main">CAFEIN</div>
        <div class="title-sub">듀크 스트리트의 진정한 커피</div>
        <div class="event-text">
            <span class="event-highlight">오픈기념 : 아아 1000원</span>
        </div>

        <!-- Info Text -->
        <div class="info-time">8AM-2PM</div>
        <div class="info-day">OPEN EVERY DAY</div>

        <!-- Right Side Image -->
        <div class="side-image">
            <img src="https://www.figma.com/api/mcp/asset/b95106e0-c862-4978-8021-f644467e63c7" alt="Cafe Interior">
        </div>
    </div>
</body>
</html>
