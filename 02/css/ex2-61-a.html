    .parent { width: 300px; height: 300px; background: #eee; }
    .child { width: 100px; height: 100px; background: rgb(255, 0, 0,0.5);
    border: 8px solid;
    box-sizing: border-box; }

         .child:nth-child(2) {
      background: green;
    }

    .child:nth-child(3) {
      background: blue;
    }

    .child:before {
      font-size: 32px;
      color: white;
    }

    .child:nth-child(1):before {
      content: "1";
    }

    .child:nth-child(2):before {
      content: "2";
    }

    .child:nth-child(3):before {
      content: "3";
    }

  </style>
