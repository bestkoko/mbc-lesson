<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@5.0.2/reset.css">
    <style>
        .item{/* 아이템 */

width: 158px;
height: 122px;


/* 내부 오토레이아웃 */
flex: none;
order: 0;
align-self: stretch;
flex-grow: 0;

/* 배경 */

position: absolute;
left: 0%;
right: 0%;
top: 0%;
bottom: 0%;

background: #9EFFAE;

}
.item:nth-child(even){
    background: black;
}
.item:nth-child(even){
    background:#D9D9D9;

}
.cont{/* 컨테이너 */
display: grid;
grid-template-rows: 1fr 1fr;
grid-template-columns: 1fr 1fr;

}


    </style>
</head>
<body>
<div class="cont">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
</div>
</body>
</html>
