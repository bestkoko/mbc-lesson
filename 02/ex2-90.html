<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mostly Fluid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    #wrap{
        display:flex;
        gap:20px;
        width:960px;
        width:100%;
        max-width:960px;
        background: gray;
        margin:0 auto;
    }
    @media screen and (max-width: 960px) {
        /* 뷰포트 폭이 0~960일때*/
        #wrap{
            width:100%;
        }
    }


  </style>
</head>
<body>
  <div id="wrap">
    <div id="content">Content</div>
    <div id="aside">Aside</div>
  </div>
</body>
</html>
