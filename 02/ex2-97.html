<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
   .box,.box1,.box2 {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-property: transform; ;
        transition-duration: 1s;
      }
      .box2{
        transform:skewX(15deg) skewy(35deg) skew(15deg, 35deg)
      }
      .box:hover{
        transform: translate(50px, 50px) rotate(10000deg); scale:(1.5)
        transform: scale(8) ;
        
      
      }
      .box1:hover:after{
        width:100%;
      }
      .box1{
        overflow: hidden;
        position:relative;
      }
      .box1:after{
        position:absolute;
        top: calc(100% - 5px);
        left: 50px;
        content:'';
        /* display:block; */
        width:0%;
        height:5px;
        background: rgb(168, 159, 250);
        transform: translate(-50%, 0);
        transition: width 0.5s;
      }
      .box1:before{
        position:absolute;
        content:'';
        width:102px;
        height:102px;
        border-radius:50%;
        background: rgba(52, 137, 242, 0.358);
        backdrop-filter: blur(1.5px);
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%) scale(0);
        z-index: 1;
        transition:all 0.5s;
    }
    .box1:hover:before{
        transform: translate(-50%, -50%) scale(1.5);
    }
    
    

    
      
      
    </style>   
 
  </head>
  <body>
    <div class="box">2D Transform</div>
    <div class="box1">2D Transform</div>
    <div class="box2">2D Transform</div>
    <style>
  
    </style>
  </body>
</html>
