<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>ex2-16</title>
    <style>
        input:hover {
            border: 3px solid red;
            background: pink;
        }
        input:focus{
            border: none;
            outline: 4px dashed green;
            background: red;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>동적 관련 가상 클래스 선택자</h1>
        <h2>로그인</h2>
        <div class="login-box">
            <form>
                <div class="form-group">
                    <label for="id">아이디</label>
                    <input type="text" id="id" name="id">
                </div>
                <div class="form-group">
                    <label for="pw">비밀번호</label>
                    <input type="password" id="pw" name="pw">
                </div>
                <button type="submit">login</button>
            </form>
        </div>
    </div>

</body>

</html>
