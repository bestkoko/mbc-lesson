<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webfont</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=rocket_launch" />
    <style>
        @font-face {
            font-family: 'JejuStoneWall';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2210-EF@1.0/EF_jejudoldam.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
    </style>
    <style>
        .t1 {
            font-family: "Nanum Pen Script", cursive;
            font-weight: 400;
            font-style: normal;
            font-size: 50px;
        }

        .t2 {
            font-family: 'JejuStoneWall';
            font-size: 50px;
        }

        .icon {
            font: 1em;
            color: red;
        }

        .t2:hover {
            color: blueviolet;
        }

        .icon:hover {
            color: blue;
        }
    </style>
</head>

<body>
    <div class="t1">오늘의 날씨를 말씀드리겠습니다.</div><span class="material-symbols-outlined icon">
        rocket_launch </span>
    <div class="t2">오늘의 날씨를 말씀드리겠습니다.</div>

</body>

</html>
