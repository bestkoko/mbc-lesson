</head>
<body>

            <img src="https://www.figma.com/api/mcp/asset/168a29b3-3dda-4fe6-93d0-ffc15bffc48e" alt="효과" class="effect-img">

        <!-- 텍스트 문구 -->
        <h1 class="title">YOU ARE NOT BULLISH ENOUGH</h1>

        <!-- 본문 텍스트 링크 -->
        <a href="http://naver.com" target="_blank" class="content-link">
            가끔은 아무런 목적 없이 흘러가는 글을 읽는 것만으로도 마음이 차분해질 때가 있습니다. 바쁜 일상 속에서 잠시 숨을 고르고, 주위를 둘러보는 여유를 가져보는 것은 어떨까요? 창밖의 풍경을 보거나, 따뜻한 차 한 잔을 마시며 머릿속을 비워내는 시간 말이죠. 특별한 의미가 담겨 있지 않은 이 글처럼, 당신의 하루에도 잠시 쉬어갈 수 있는 평온한 빈칸이 생기기를 바랍니다.
        </a>
    </div>
</body>
</html>
